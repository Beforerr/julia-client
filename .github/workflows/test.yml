name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - uses: julia-actions/setup-julia@v2
      - run: go test -C go -v -timeout 300s
